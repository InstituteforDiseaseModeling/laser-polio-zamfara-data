name: Publish to IDM Artifactory

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type (major, minor, patch):'
        required: true
        default: 'patch'
      dry_run:
        description: 'Dry run (true/false):'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: restricted
    env:
      PIP_EXTRA_INDEX_URL: https://packages.idmod.org/api/pypi/pypi-production/simple

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          pip install bump-my-version build twine

      - name: Bump version
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          DRY_FLAG="${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}"
          bump-my-version bump ${{ github.event.inputs.version_type }} $DRY_FLAG

      - name: Push changes and tag
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin HEAD:main
          git push origin v$(bump-my-version show current_version)

      - name: Build package
        run: python -m build

      - name: Publish to IDM Artifactory
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_PROD_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PROD_PASSWORD }}
        run: |
          python -m twine upload --verbose \
            --repository-url https://packages.idmod.org/api/pypi/idm-pypi-production/ \
            dist/*.whl
